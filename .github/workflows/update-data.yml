name: Update Ski Resort Data

on:
  schedule:
    # 毎朝5時（JST） = 20:00 UTC（前日）
    - cron: '0 20 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape resort data
        run: python scrape_surfsnow.py

      - name: Update operating status
        run: python update_status.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ski_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update ski resort data $(date +%Y-%m-%d)"
            git push
          fi
